<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Summary | Discharge Summary System</title>
    <style>
        :root {
            --bg-dark: #0a0e17;
            --bg-card: rgba(15, 20, 35, 0.6);
            --card-border: rgba(99, 102, 241, 0.15);
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0f172a 50%, #1a1a2e 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .shell {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .header-nav a {
            color: var(--text-secondary);
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 28px;
            backdrop-filter: blur(16px);
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--card-border);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            background: rgba(15, 20, 35, 0.8);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-group textarea.short {
            min-height: 60px;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #7c3aed);
            color: white;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-secondary {
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent);
            border: 1px solid var(--card-border);
            margin-left: 12px;
        }

        .error-msg {
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            color: var(--danger);
            margin-bottom: 20px;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
    </style>
</head>

<body>
    <div class="shell">
        <header class="header">
            <h1>✏️ Edit Discharge Summary</h1>
            <nav class="header-nav">
                <a href="/">Dashboard</a>
                <a href="/summaries">All Summaries</a>
                <a href="/logout">Logout</a>
            </nav>
        </header>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
            <input type="hidden" name="summary_id" value="{{ summary.id }}" />

            <!-- Patient Information -->
            <div class="card">
                <div class="section-title">Patient Information</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="patient_name">Patient Name</label>
                        <input type="text" id="patient_name" name="patient_name"
                            value="{{ summary.patient_name or '' }}" required>
                    </div>
                    <div class="form-group">
                        <label for="hospital_id">Hospital ID</label>
                        <input type="text" id="hospital_id" name="hospital_id" value="{{ summary.hospital_id or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="patient_age">Age</label>
                        <input type="text" id="patient_age" name="patient_age" value="{{ summary.patient_age or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="patient_sex">Sex</label>
                        <select id="patient_sex" name="patient_sex">
                            <option value="">Select...</option>
                            <option value="Male" {% if summary.patient_sex=='Male' %}selected{% endif %}>Male</option>
                            <option value="Female" {% if summary.patient_sex=='Female' %}selected{% endif %}>Female
                            </option>
                            <option value="Other" {% if summary.patient_sex=='Other' %}selected{% endif %}>Other
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="admission_date">Admission Date</label>
                        <input type="date" id="admission_date" name="admission_date"
                            value="{{ summary.admission_date or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="discharge_date">Discharge Date</label>
                        <input type="date" id="discharge_date" name="discharge_date"
                            value="{{ summary.discharge_date or '' }}">
                    </div>
                </div>
            </div>

            <!-- Chief Complaints & History -->
            <div class="card">
                <div class="section-title">Chief Complaints & History</div>
                <div class="form-group">
                    <label for="chief_complaints">Chief Complaints</label>
                    <textarea id="chief_complaints" name="chief_complaints" class="short"
                        placeholder="e.g., Fever for 3 days, abdominal pain...">{{ summary.chief_complaints or '' }}</textarea>
                </div>
                <div class="form-group">
                    <label for="history_of_illness">History of Present Illness</label>
                    <textarea id="history_of_illness" name="history_of_illness"
                        placeholder="Detailed history...">{{ summary.history_of_illness or '' }}</textarea>
                </div>
            </div>

            <!-- Diagnosis -->
            <div class="card">
                <div class="section-title">Diagnosis & Investigations</div>
                <div class="form-group">
                    <label for="diagnosis">Final Diagnosis</label>
                    <textarea id="diagnosis" name="diagnosis" class="short"
                        placeholder="e.g., Acute appendicitis">{{ summary.diagnosis or '' }}</textarea>
                </div>
                <div class="form-group">
                    <label for="investigations">Investigations Done</label>
                    <textarea id="investigations" name="investigations"
                        placeholder="e.g., CBC, USG Abdomen, CT scan...">{{ summary.investigations or '' }}</textarea>
                </div>
            </div>

            <!-- Treatment -->
            <div class="card">
                <div class="section-title">Treatment & Medications</div>
                <div class="form-group">
                    <label for="treatment_given">Treatment Given / Procedure</label>
                    <textarea id="treatment_given" name="treatment_given"
                        placeholder="e.g., Laparoscopic appendectomy performed...">{{ summary.treatment_given or '' }}</textarea>
                </div>
                <div class="form-group">
                    <label for="medications">Medications / Discharge Prescriptions</label>
                    <textarea id="medications" name="medications"
                        placeholder="e.g., Tab. Paracetamol 500mg TDS for 5 days...">{{ summary.medications or '' }}</textarea>
                </div>
            </div>

            <!-- Discharge & Follow-up -->
            <div class="card">
                <div class="section-title">Discharge & Follow-up</div>
                <div class="form-group">
                    <label for="condition_at_discharge">Condition at Discharge</label>
                    <textarea id="condition_at_discharge" name="condition_at_discharge" class="short"
                        placeholder="e.g., Patient is afebrile, vitals stable...">{{ summary.condition_at_discharge or '' }}</textarea>
                </div>
                <div class="form-group">
                    <label for="follow_up_instructions">Follow-up Instructions</label>
                    <textarea id="follow_up_instructions" name="follow_up_instructions"
                        placeholder="e.g., Review after 7 days, wound dressing, diet advice...">{{ summary.follow_up_instructions or '' }}</textarea>
                </div>
            </div>

            <!-- Save Button -->
            <div class="card">
                <div class="actions">
                    <button type="submit" class="btn btn-primary">💾 Save Changes</button>
                    <a href="/summary/{{ summary.id }}" class="btn btn-secondary">Cancel</a>
                </div>
            </div>
        </form>
    </div>

    <!-- Session Timeout Script -->
    <script>
        (function () {
            'use strict';
            const SESSION_TIMEOUT = 30 * 60 * 1000;
            const WARNING_TIME = 2 * 60 * 1000;
            let warningShown = false;
            let warningTimeout = null;
            let countdownInterval = null;

            function createWarningModal() {
                const modal = document.createElement('div');
                modal.id = 'session-timeout-modal';
                modal.style.cssText = 'display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:10000;align-items:center;justify-content:center;';
                modal.innerHTML = `<div style="background:linear-gradient(135deg,rgba(15,20,35,0.95),rgba(26,31,58,0.95));border:1px solid rgba(99,102,241,0.3);border-radius:24px;padding:40px;max-width:480px;width:90%;text-align:center;"><h2 style="color:#f9fafb;margin-bottom:16px;">Session Expiring Soon</h2><p style="color:#9ca3af;margin-bottom:24px;">Your session will expire in <strong id="countdown-timer" style="color:#f59e0b;">2:00</strong></p><div style="display:flex;gap:12px;justify-content:center;"><button id="stay-logged-in-btn" style="background:linear-gradient(135deg,#6366f1,#7c3aed);color:white;border:none;padding:14px 32px;border-radius:12px;font-weight:600;cursor:pointer;">Stay Logged In</button><button id="logout-now-btn" style="background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.3);padding:14px 32px;border-radius:12px;font-weight:600;cursor:pointer;">Logout</button></div></div>`;
                document.body.appendChild(modal);
                return modal;
            }

            function showWarning() {
                if (warningShown) return;
                warningShown = true;
                const modal = document.getElementById('session-timeout-modal') || createWarningModal();
                modal.style.display = 'flex';
                let remainingSeconds = WARNING_TIME / 1000;
                countdownInterval = setInterval(() => {
                    remainingSeconds--;
                    document.getElementById('countdown-timer').textContent = `${Math.floor(remainingSeconds / 60)}:${(remainingSeconds % 60).toString().padStart(2, '0')}`;
                    if (remainingSeconds <= 0) { clearInterval(countdownInterval); window.location.href = '/logout'; }
                }, 1000);
                document.getElementById('stay-logged-in-btn').onclick = () => {
                    fetch('/keep_alive', { credentials: 'same-origin' }).then(r => r.ok ? (hideWarning(), resetWarningTimer()) : window.location.href = '/logout');
                };
                document.getElementById('logout-now-btn').onclick = () => window.location.href = '/logout';
            }

            function hideWarning() { const m = document.getElementById('session-timeout-modal'); if (m) m.style.display = 'none'; clearInterval(countdownInterval); warningShown = false; }
            function resetWarningTimer() { if (warningTimeout) clearTimeout(warningTimeout); warningTimeout = setTimeout(showWarning, SESSION_TIMEOUT - WARNING_TIME); }
            ['mousedown', 'keydown', 'scroll', 'touchstart'].forEach(e => document.addEventListener(e, () => !warningShown && resetWarningTimer(), { passive: true }));
            resetWarningTimer();
        })();
    </script>
</body>

</html>
